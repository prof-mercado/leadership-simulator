const COLORS = { forest: "#154734", lima: "#72BF44", cyprus: "#003B49", mist: "#B1E4E3", orient: "#005F83", pebble: "#D6D1CA", white: "#FFFFFF", offWhite: "#F7F7F5", darkGray: "#333333", shuttle: "#63666A" };

const IGER_KB = [
  { keywords: ["pixar", "jobs", "steve", "convince", "sell"], response: "The Pixar deal was really about building trust with Steve Jobs. I flew to Cupertino, sat with him, and listened to everything that frustrated him about Disney\u2019s previous leadership. I didn\u2019t lead with a number or a pitch. I led with respect for what Pixar had built. I promised creative independence, and I meant it. Steve became our largest individual shareholder and joined our board. That relationship became one of the most important of my career." },
  { keywords: ["pixar", "culture", "independence", "autonomy"], response: "When we acquired Pixar, I made a commitment that we would not impose Disney\u2019s corporate processes on their creative culture. John Lasseter and Ed Catmull continued to run the studio their way. I believed then, and still believe now, that the people who created the value are the ones who know how to keep creating it. Our job was to support them, not manage them." },
  { keywords: ["marvel", "feige", "kevin", "mcu", "superhero"], response: "Marvel was a $4 billion bet that a lot of people thought was too risky. But I saw something others missed: an incredible library of characters and a leader in Kevin Feige who had a vision for connecting them all. I gave Kevin near-total creative autonomy. He reported directly to me, not through our studio hierarchy. The result speaks for itself: the MCU became the highest-grossing film franchise in history." },
  { keywords: ["lucasfilm", "lucas", "george", "star wars"], response: "George Lucas was incredibly protective of Star Wars, as he should have been. I had to convince him that we would honor his legacy while also evolving it. That took multiple personal conversations where I demonstrated genuine respect for what he had built. It wasn\u2019t a corporate negotiation; it was a relationship built on trust." },
  { keywords: ["fox", "21st century", "buying innovation"], response: "The Fox acquisition was our largest deal at $71 billion. It was about building the content library we needed for streaming. But I\u2019ll be honest: there\u2019s a fair criticism that Disney has become better at buying innovation than building it organically. The acquisitions were the right calls, but a healthy company needs to innovate from within too." },
  { keywords: ["disney+", "streaming", "netflix", "launch", "platform"], response: "Launching Disney+ was probably the most important strategic decision of my tenure. We pulled our content from Netflix, sacrificed about $150 million a year in licensing revenue, and bet the company\u2019s future on streaming. Wall Street punished us initially. But I believed that if we didn\u2019t own the relationship with our audience, we would slowly become irrelevant. We hit 100 million subscribers in 16 months." },
  { keywords: ["stream", "profitab", "money", "loss"], response: "The path to streaming profitability was painful. Disney+ lost over a billion dollars in a single quarter at its worst. We had to make hard choices about content spending. But I always believed that the short-term pain was worth the long-term strategic position." },
  { keywords: ["chapek", "successor", "replace", "fail"], response: "I don\u2019t want to speak negatively about Bob Chapek. What I will say is that leadership transitions are one of the hardest things any organization faces. I take some responsibility for not ensuring a smoother handoff. The lesson is that choosing and preparing a successor is one of the most important things a leader does, and I didn\u2019t do it well enough." },
  { keywords: ["retire", "come back", "return", "came back", "retirement"], response: "Coming back was not something I planned or wanted. But when the board called and said the company needed me, I felt an obligation. Disney is not just a company to me; it\u2019s an institution that matters to millions of people. I committed to a defined term and to finding a proper successor. I came back to stabilize and to get the transition right this time." },
  { keywords: ["clock build", "time tell", "outlast", "without you"], response: "This is a question I wrestle with honestly. The fact that Disney struggled after I left could mean I was a time teller, not a clock builder. But I\u2019d push back slightly: the architecture I built \u2014 the acquisitions, the IP portfolio, the streaming platform \u2014 those are durable assets. The challenge was leadership succession, which is a different problem. I think you can build a great clock and still stumble on the handoff." },
  { keywords: ["leader", "good leader", "makes", "quality", "what makes"], response: "I\u2019ve come to believe that leadership comes down to a few core things: optimism, courage, and decisiveness. Optimism because people don\u2019t follow pessimists. Courage because the most important decisions are always the hardest ones. And decisiveness because indecision is corrosive. Over time I added fairness and thoughtfulness to that list." },
  { keywords: ["principle", "value", "core", "belief", "philosophy"], response: "My three core leadership principles are optimism, courage, and decisiveness. Optimism is not about ignoring problems; it\u2019s about believing that you and your team can solve them. Courage means being willing to take risks and make unpopular decisions. Decisiveness means not letting fear of being wrong paralyze you." },
  { keywords: ["mistake", "failure", "wrong", "regret", "worst"], response: "One of my biggest regrets is not handling the leadership transition better when I retired. I should have spent more time preparing the organization for a post-Iger era. I was also too slow to recognize when content quality was slipping at Marvel because of the sheer volume of output. When you\u2019re producing too much too fast, quality suffers." },
  { keywords: ["listen", "listening", "communication", "communicat"], response: "The most important quality of a good leader is the willingness to listen. When I became CEO, I made it a point to spend time with people at every level of the organization, not just executives. You learn things from the people closest to the work that you\u2019ll never learn in a boardroom. Listening isn\u2019t passive; it\u2019s the foundation of good decision-making." },
  { keywords: ["trust", "relationship", "build trust", "loyalty"], response: "Trust is everything in leadership. You build it through consistency: doing what you say you\u2019re going to do, every time. With Steve Jobs, with George Lucas, with Kevin Feige, it was always about demonstrating that I would honor my commitments. Trust takes years to build and seconds to destroy." },
  { keywords: ["espn", "sports", "betting", "gambl"], response: "ESPN represents Disney\u2019s most significant strategic crossroads. We partnered with Penn Entertainment for sports betting rather than building it ourselves, because gambling operations require expertise we don\u2019t have, and it protects the Disney family brand. It\u2019s about knowing what you\u2019re good at and finding partners for what you\u2019re not." },
  { keywords: ["risk", "bold", "courage", "fear", "afraid"], response: "Every major decision I made at Disney involved significant risk. The Pixar acquisition, Marvel, launching Disney+. But I\u2019ve learned that the biggest risk in business is not taking risks at all. The entertainment industry changes so fast that standing still means falling behind. Courage isn\u2019t the absence of fear; it\u2019s making the right call despite the fear." },
  { keywords: ["innovation", "innovate", "new", "creative", "invent"], response: "I\u2019ll be honest: Disney has historically been better at acquiring innovation than building it organically. Pixar, Marvel, Lucasfilm, Fox \u2014 all acquisitions. The question of whether Disney can generate breakthrough creative innovation from within is one the company still needs to answer." },
  { keywords: ["culture", "morale", "employee", "workplace"], response: "When I came back in 2022, one of the first things I heard was that the culture of creative risk-taking had been damaged. The Chapek reorganization had centralized budget authority away from creative leaders. I moved quickly to reverse that, because Disney\u2019s competitive advantage has always been its storytelling culture." },
  { keywords: ["vision", "direction", "future", "where", "going"], response: "A leader\u2019s most important job is setting a clear direction that people can rally around. When I became CEO in 2005, I articulated three strategic priorities: generate the best creative content possible, embrace technology, and grow globally. Everything we did connected back to those priorities. Clarity of vision gives people permission to be bold within a framework." },
  { keywords: ["advice", "young", "student", "career", "aspir"], response: "My advice to young leaders: be genuinely curious, be willing to take risks early in your career, and never stop learning. I started as a weatherman at a local ABC station. I never imagined I\u2019d run Disney. But at every step, I tried to learn as much as I could and build real relationships. And always choose optimism." },
  { keywords: ["decision", "how do you decide", "making decisions", "tough call"], response: "I try to make decisions with the information available rather than waiting for perfect information, which never comes. I gather input from people I trust, think about second and third order consequences, and then commit. The worst thing a leader can do is sit in indecision." },
  { keywords: ["storytelling", "story", "stories", "narrative"], response: "Disney is fundamentally a storytelling company. Every acquisition I made was really about acquiring the ability to tell more stories: Pixar\u2019s animation, Marvel\u2019s superheroes, Lucasfilm\u2019s Star Wars. When I talk about creative excellence being the heart of the company, I mean storytelling excellence." },
  { keywords: ["management", "manager", "versus", "difference"], response: "Management is about handling complexity, keeping the trains running on time. Leadership is about setting direction and inspiring people to follow. Disney needs both. The danger is when you have too much management and too little leadership, or vice versa." },
  { keywords: ["parks", "theme park", "experience", "disneyland"], response: "The parks are the physical embodiment of Disney\u2019s brand promise. The $60 billion expansion plan reflects my belief that immersive experiences are something technology companies cannot replicate. Streaming content can be copied; a day at a Disney park cannot." },
  { keywords: ["emotional intelligence", "empathy", "emotion"], response: "I learned empathy partly through personal experience and partly through watching leaders who lacked it fail. When you\u2019re making decisions that affect thousands of people\u2019s livelihoods, you have to understand how those decisions feel, not just how they look on a spreadsheet." },
  { keywords: ["conflict", "disagree", "fight", "tension"], response: "I generally prefer collaboration over confrontation, but there are times when you have to be direct and hold your ground. When I decided to pull content from Netflix, there was enormous internal opposition. I listened to the concerns, acknowledged them, and then made the call. You can be respectful and still be decisive." },
  { keywords: ["authentic", "real", "genuine", "honest"], response: "I wrote my memoir because I wanted to be honest about both the successes and the struggles. I think leaders who pretend to have all the answers are actually weaker than those who admit what they don\u2019t know. My colleagues have described me as \u2018what you see is what you get.\u2019 I take that as a compliment." },
  { keywords: ["transform", "change", "turnaround", "pivot"], response: "Transformation at Disney wasn\u2019t about changing everything at once. It was about making a series of bold but connected moves over time. Pixar revitalized animation. Marvel and Lucasfilm expanded our IP. Fox gave us the streaming library. Disney+ gave us direct consumer access. Each move built on the last." },
  { keywords: ["competition", "compete", "apple", "amazon", "tech"], response: "What keeps me up at night is competing against technology companies with fundamentally different cost structures. Apple, Amazon, and Netflix can subsidize content indefinitely. Disney\u2019s advantage is our unmatched IP library and beloved brand. But we have to leverage those assets in new ways." },
  { keywords: ["hire", "talent", "people", "team", "recruit"], response: "The most important decisions I made were about people, not products. Keeping Kevin Feige at Marvel, bringing in the right leaders for each division, protecting creative talent from corporate bureaucracy. If you get the people right, the products take care of themselves." },
  { keywords: ["delegat", "hands off", "hands on", "micromanage"], response: "The best leaders know when to be hands-on and when to step back. With acquisitions, I was very hands-on during negotiation and integration. But once creative leaders were in place and trusted, I stepped back. Kevin Feige didn\u2019t need me telling him how to make Marvel movies. He needed me to protect his autonomy." },
  { keywords: ["legacy", "remember", "history", "contribution"], response: "I\u2019d like to be remembered as someone who positioned Disney for its next century. But honestly, if people remember me as someone who treated people with respect and made bold decisions with integrity, that matters more to me than any business metric." },
  { keywords: ["memoir", "book", "ride of a lifetime", "wrote"], response: "I wrote The Ride of a Lifetime because I thought the leadership lessons might be useful to others. I was intentionally honest about my insecurities, failures, and moments of doubt. The job is hard, the pressure is enormous, and the loneliness at the top is real. I wanted to be truthful about all of that." },
  { keywords: ["strateg", "plan", "priority", "priorities"], response: "When I became CEO, I set three strategic priorities: create the best content, embrace technology, and grow globally. Those three pillars guided every major decision for 15 years. I believe in having a small number of clear priorities that everyone can understand and connect their work to." },
  { keywords: ["optimism", "positive", "pessimist", "hope"], response: "I genuinely believe optimism is the most important quality a leader can have. Not naive optimism, but a fundamental belief that challenges can be overcome. People do not follow pessimists. When I walked into rooms at Disney, I tried to project confidence that we could solve whatever was in front of us." },
  { keywords: ["work life", "balance", "family", "personal"], response: "I won\u2019t pretend I got the work-life balance right. This job consumed my life for 15 years. What I\u2019d tell anyone in a demanding leadership role is to be honest with yourself and your family about the tradeoffs you\u2019re making." },
  { keywords: ["negotiate", "deal", "negotiation"], response: "My approach to negotiation has always been relationship-first. With Steve Jobs, George Lucas, Rupert Murdoch \u2014 I always started by understanding what the other person truly cared about. It\u2019s rarely just money. Once you understand the emotional core, you can structure a deal that works for everyone." },
  { keywords: ["power", "authority", "control", "hierarchy"], response: "In an entrepreneurial organization, authority should come from your expertise and values, not from your title. The moment a leader relies on positional authority alone, they\u2019ve already lost." },
];

const FALLBACK = [
  "That\u2019s an interesting question. What I can tell you is that every major decision at Disney came back to three principles: optimism, courage, and decisiveness. Which would you like me to elaborate on?",
  "Good question. Rather than a generic answer, ask me about a specific decision \u2014 Pixar, Marvel, Disney+, the Chapek situation \u2014 and I\u2019ll give you the real story.",
  "I appreciate that. One thing I\u2019ve learned is that the answers are rarely simple. Could you be more specific about which aspect of Disney\u2019s leadership you\u2019re curious about?",
  "That\u2019s thoughtful. Let me connect it to something concrete: every challenge I faced required a different approach. Ask me about any particular decision and I\u2019ll share what I was thinking.",
];

function findBestResponse(input) {
  const lower = input.toLowerCase();
  let bestScore = 0, bestResp = null;
  for (const e of IGER_KB) {
    let score = 0;
    for (const kw of e.keywords) { if (lower.includes(kw)) score += (kw.length > 5 ? 2 : 1); }
    if (score > bestScore) { bestScore = score; bestResp = e.response; }
  }
  return bestScore >= 1 ? bestResp : FALLBACK[Math.floor(Math.random() * FALLBACK.length)];
}

const SCENARIOS = [
  { id:1, title:"The Pixar Acquisition", act:"ALIGN", context:"It is 2006. Disney Animation is struggling with flops. Pixar, led by Steve Jobs, is the hottest studio in Hollywood. Your team says acquiring Pixar could revive Disney Animation, but Jobs is notoriously difficult to negotiate with and the price tag ($7.4B) is enormous. How do you approach this?", options:[{text:"Send your M&A team to negotiate hard on price. This is a business deal, and shareholders expect fiscal discipline.",style:"transactional",conflict:"competing",paradigm:"transactional",clock:0},{text:"Meet Jobs personally. Listen to what he cares about (creative autonomy), and build the deal around protecting Pixar\u2019s culture, even if it means paying more.",style:"democratic",conflict:"collaborating",paradigm:"transformational",clock:2},{text:"Make a bold public offer that signals Disney\u2019s commitment. Use the media attention to pressure Jobs into a deal.",style:"authoritarian",conflict:"competing",paradigm:"visionary",clock:0},{text:"Invest in building Disney Animation internally. Hiring Pixar talent one by one is cheaper and avoids integration risk.",style:"laissez-faire",conflict:"avoiding",paradigm:"transactional",clock:1}], igerChoice:1, igerExplanation:"Iger chose to build personal trust with Jobs first. He flew to Cupertino, listened to Jobs\u2019s frustrations with Disney\u2019s previous leadership, and structured the deal to protect Pixar\u2019s creative independence completely. Jobs became Disney\u2019s largest individual shareholder and a board member." },
  { id:2, title:"The Streaming Gamble", act:"ADAPT", context:"It is 2017. Netflix is disrupting entertainment. Disney\u2019s content is spread across multiple third-party platforms. Your team proposes pulling all Disney content and launching your own streaming service. This means sacrificing billions in licensing revenue with no guarantee Disney+ will succeed.", options:[{text:"Move cautiously. Keep licensing deals while testing a small streaming product.",style:"laissez-faire",conflict:"avoiding",paradigm:"transactional",clock:1},{text:"Go all-in. Pull content from Netflix, reorganize the entire company around streaming, and accept short-term losses.",style:"authoritarian",conflict:"competing",paradigm:"visionary",clock:2},{text:"Form a joint venture with a tech company to share the risk.",style:"democratic",conflict:"compromising",paradigm:"dispersed",clock:1},{text:"Acquire an existing streaming platform rather than building from scratch.",style:"democratic",conflict:"collaborating",paradigm:"transformational",clock:1}], igerChoice:1, igerExplanation:"Iger went all-in on Disney+. He reorganized the entire company around streaming, pulled content from Netflix, and invested billions in original content. Disney+ hit 100 million subscribers in 16 months." },
  { id:3, title:"The Chapek Crisis", act:"ARCHITECT", context:"It is November 2022. You retired in February 2020 and handed the CEO role to Bob Chapek. Under Chapek, Disney\u2019s stock has fallen 40%, creative talent is leaving, and employee morale is low. The board calls and asks you to come back. You are 71 years old.", options:[{text:"Decline. You built the clock; it should work without you.",style:"laissez-faire",conflict:"avoiding",paradigm:"dispersed",clock:2},{text:"Return as CEO with a clear mandate and defined term to find a proper successor.",style:"authoritarian",conflict:"competing",paradigm:"visionary",clock:1},{text:"Return as Executive Chairman, not CEO. Advise and mentor a new CEO candidate.",style:"democratic",conflict:"collaborating",paradigm:"dispersed",clock:2},{text:"Agree to return only if given full authority to restructure. No half-measures.",style:"authoritarian",conflict:"competing",paradigm:"transformational",clock:0}], igerChoice:1, igerExplanation:"Iger returned as CEO with a clear mandate but also a clear timeline. He restructured the company, restored creative leadership authority, and began the search for a long-term successor." },
  { id:4, title:"Creative Autonomy vs. Corporate Control", act:"ALIGN", context:"You have just acquired Marvel. Kevin Feige has a bold vision for an interconnected cinematic universe. Your corporate team wants Marvel to follow Disney\u2019s standard processes. Feige says those processes will kill the creative vision. Who do you back?", options:[{text:"Back the corporate team. Disney has proven systems. Marvel needs to integrate.",style:"authoritarian",conflict:"competing",paradigm:"transactional",clock:0},{text:"Back Feige completely. Give Marvel near-total creative and operational autonomy.",style:"laissez-faire",conflict:"accommodating",paradigm:"dispersed",clock:2},{text:"Create a hybrid: Marvel keeps creative autonomy but uses Disney\u2019s distribution and financial systems.",style:"democratic",conflict:"collaborating",paradigm:"transformational",clock:2},{text:"Set up a formal review process where Marvel pitches to Disney leadership for approval.",style:"democratic",conflict:"compromising",paradigm:"transactional",clock:0}], igerChoice:1, igerExplanation:"Iger gave Feige near-total autonomy. Marvel operated almost independently, with Feige reporting directly to Iger. The MCU became the highest-grossing film franchise in history ($29B+)." },
  { id:5, title:"The ESPN Bet", act:"ADAPT", context:"It is 2023. ESPN is Disney\u2019s most valuable media asset but cable is declining. Sports betting is exploding. Your team proposes transforming ESPN into a sports betting platform, but this changes Disney\u2019s family-friendly brand identity.", options:[{text:"Keep ESPN focused on sports media. The brand risk of gambling is too high.",style:"laissez-faire",conflict:"avoiding",paradigm:"transactional",clock:1},{text:"Launch ESPN Bet aggressively. The future of sports media IS betting. Move fast.",style:"authoritarian",conflict:"competing",paradigm:"visionary",clock:1},{text:"Partner with an established betting company. Share the risk and brand exposure.",style:"democratic",conflict:"collaborating",paradigm:"transformational",clock:2},{text:"Test betting features in a limited market first. Gather data before committing.",style:"democratic",conflict:"compromising",paradigm:"transactional",clock:1}], igerChoice:2, igerExplanation:"Iger partnered with Penn Entertainment, licensing the ESPN brand while letting Penn handle gambling operations. This protected Disney\u2019s family brand while capturing the sports betting opportunity." },
];

function computeProfile(ch) {
  const s={}, c={}, p={}; let cl=0, m=0;
  const styles=["laissez-faire","democratic","authoritarian"]; styles.forEach(x=>s[x]=0);
  ["competing","collaborating","compromising","avoiding","accommodating"].forEach(x=>c[x]=0);
  ["transactional","transformational","visionary","dispersed"].forEach(x=>p[x]=0);
  ch.forEach((v,i)=>{ if(v!==null){const o=SCENARIOS[i].options[v]; s[o.style]=(s[o.style]||0)+1; c[o.conflict]=(c[o.conflict]||0)+1; p[o.paradigm]=(p[o.paradigm]||0)+1; cl+=o.clock; if(v===SCENARIOS[i].igerChoice) m++;}});
  const ts=Object.entries(s).sort((a,b)=>b[1]-a[1])[0]; const tc=Object.entries(c).sort((a,b)=>b[1]-a[1])[0]; const tp=Object.entries(p).sort((a,b)=>b[1]-a[1])[0];
  return {styleCounts:s,conflictCounts:c,paradigmCounts:p,clockScore:cl,matchCount:m,topStyle:ts[0],topConflict:tc[0],topParadigm:tp[0]};
}

function BarChart({data,color}) {
  const max=Math.max(...Object.values(data),1);
  return <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>{Object.entries(data).map(([k,v])=><div key={k} style={{display:"flex",alignItems:"center",gap:"8px"}}><span style={{fontSize:"11px",width:"110px",textAlign:"right",textTransform:"capitalize",color:COLORS.shuttle}}>{k}</span><div style={{flex:1,height:"18px",borderRadius:"3px",background:COLORS.pebble+"40"}}><div style={{height:"100%",borderRadius:"3px",width:`${(v/max)*100}%`,background:color,minWidth:v>0?"8px":"0",transition:"width 0.7s"}}/></div><span style={{fontSize:"11px",width:"16px",fontWeight:"bold",color}}>{v}</span></div>)}</div>;
}

function App() {
  const [phase,setPhase]=useState("welcome"); const [name,setName]=useState(""); const [idx,setIdx]=useState(0);
  const [choices,setChoices]=useState(Array(5).fill(null)); const [showExp,setShowExp]=useState(false);
  const [msgs,setMsgs]=useState([]); const [inp,setInp]=useState(""); const ref=useRef(null);
  useEffect(()=>{ref.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  const pick=(i)=>{const n=[...choices];n[idx]=i;setChoices(n);setShowExp(true);};
  const next=()=>{setShowExp(false);if(idx<4)setIdx(idx+1);else setPhase("interview");};
  const send=()=>{if(!inp.trim())return;const u=inp.trim();setInp("");setMsgs(p=>[...p,{role:"user",text:u}]);setTimeout(()=>{setMsgs(p=>[...p,{role:"assistant",text:findBestResponse(u)}]);},600+Math.random()*800);};
  const profile=computeProfile(choices); const clockLabel=profile.clockScore>=7?"Strong Clock Builder":profile.clockScore>=4?"Balanced":"Time Teller Tendency";
  const igerMatch=Math.round((profile.matchCount/5)*100);

  if(phase==="welcome") return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",background:COLORS.cyprus}}><div style={{maxWidth:"520px",width:"100%",textAlign:"center"}}><div style={{fontSize:"11px",fontWeight:"bold",letterSpacing:"3px",color:COLORS.lima}}>BUS 5001 | SESSION 9.3</div><h1 style={{fontSize:"36px",fontWeight:"bold",color:COLORS.white,margin:"12px 0"}}>Disney Leadership Simulator</h1><p style={{fontSize:"16px",color:COLORS.mist,marginBottom:"24px"}}>Step into Bob Iger's shoes. Make real leadership decisions. Discover your own leadership style.</p><input type="text" placeholder="Enter your name" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&name.trim()&&setPhase("scenarios")} style={{width:"100%",padding:"12px",borderRadius:"8px",textAlign:"center",fontSize:"16px",background:COLORS.forest,border:`2px solid ${COLORS.lima}40`,color:COLORS.white,outline:"none",marginBottom:"12px"}}/><button onClick={()=>name.trim()&&setPhase("scenarios")} disabled={!name.trim()} style={{width:"100%",padding:"12px",borderRadius:"8px",fontWeight:"bold",fontSize:"16px",background:COLORS.lima,color:COLORS.forest,border:"none",cursor:"pointer",opacity:name.trim()?1:0.4}}>Begin the Simulation</button><div style={{marginTop:"24px",textAlign:"left",padding:"16px",borderRadius:"8px",background:COLORS.forest}}><div style={{fontSize:"11px",fontWeight:"bold",letterSpacing:"2px",color:COLORS.lima,marginBottom:"8px"}}>HOW IT WORKS</div><p style={{fontSize:"13px",color:COLORS.mist,margin:"4px 0"}}><strong style={{color:COLORS.white}}>Phase 1:</strong> Face 5 real Disney leadership decisions.</p><p style={{fontSize:"13px",color:COLORS.mist,margin:"4px 0"}}><strong style={{color:COLORS.white}}>Phase 2:</strong> Interview Bob Iger about his leadership approach.</p><p style={{fontSize:"13px",color:COLORS.mist,margin:"4px 0"}}><strong style={{color:COLORS.white}}>Phase 3:</strong> Receive your personal Leadership Style Profile.</p></div></div></div>;

  if(phase==="scenarios"){const sc=SCENARIOS[idx]; return <div style={{minHeight:"100vh",padding:"16px",background:COLORS.offWhite}}><div style={{maxWidth:"700px",margin:"0 auto"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"12px"}}><span style={{fontSize:"11px",fontWeight:"bold",letterSpacing:"2px",color:COLORS.orient}}>DECISION {idx+1} OF 5</span><span style={{fontSize:"11px",padding:"2px 8px",borderRadius:"4px",fontWeight:"bold",background:COLORS.mist,color:COLORS.forest}}>{sc.act}</span></div><div style={{width:"100%",height:"4px",borderRadius:"2px",background:COLORS.pebble,marginBottom:"20px"}}><div style={{height:"100%",borderRadius:"2px",width:`${((idx+1)/5)*100}%`,background:COLORS.lima,transition:"width 0.5s"}}/></div><h2 style={{fontSize:"24px",fontWeight:"bold",color:COLORS.forest,marginBottom:"12px"}}>{sc.title}</h2><p style={{color:COLORS.darkGray,lineHeight:1.6,marginBottom:"20px"}}>{sc.context}</p><div style={{display:"flex",flexDirection:"column",gap:"10px"}}>{sc.options.map((opt,i)=>{const ch=choices[idx]===i,ig=showExp&&i===sc.igerChoice; return <button key={i} onClick={()=>!showExp&&pick(i)} disabled={showExp} style={{width:"100%",textAlign:"left",padding:"14px",borderRadius:"8px",border:`2px solid ${ig?COLORS.lima:ch?COLORS.orient:COLORS.pebble}`,background:ch?(ig?COLORS.lima+"20":COLORS.orient+"15"):COLORS.white,opacity:showExp&&!ch&&!ig?0.5:1,cursor:showExp?"default":"pointer"}}><div style={{display:"flex",alignItems:"flex-start",gap:"10px"}}><span style={{fontWeight:"bold",fontSize:"16px",color:ig?COLORS.lima:ch?COLORS.orient:COLORS.shuttle}}>{String.fromCharCode(65+i)}</span><div><p style={{color:COLORS.darkGray,margin:0}}>{opt.text}</p>{ch&&<span style={{display:"inline-block",marginTop:"6px",fontSize:"11px",fontWeight:"bold",padding:"2px 8px",borderRadius:"4px",background:COLORS.orient,color:COLORS.white}}>YOUR CHOICE</span>}{ig&&<span style={{display:"inline-block",marginTop:"6px",marginLeft:"4px",fontSize:"11px",fontWeight:"bold",padding:"2px 8px",borderRadius:"4px",background:COLORS.lima,color:COLORS.forest}}>IGER'S CHOICE</span>}</div></div></button>;})}</div>{showExp&&<div style={{marginTop:"20px",padding:"16px",borderRadius:"8px",borderLeft:`4px solid ${COLORS.forest}`,background:COLORS.mist+"40"}}><div style={{fontSize:"11px",fontWeight:"bold",letterSpacing:"2px",color:COLORS.forest,marginBottom:"8px"}}>WHAT IGER ACTUALLY DID</div><p style={{fontSize:"13px",lineHeight:1.6,color:COLORS.darkGray}}>{sc.igerExplanation}</p><button onClick={next} style={{marginTop:"12px",padding:"8px 20px",borderRadius:"8px",fontWeight:"bold",fontSize:"13px",background:COLORS.forest,color:COLORS.white,border:"none",cursor:"pointer"}}>{idx<4?"Next Decision":"Interview Bob Iger"}</button></div>}</div></div>;}

  if(phase==="interview") return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:COLORS.offWhite}}><div style={{padding:"12px",textAlign:"center",background:COLORS.cyprus}}><div style={{fontSize:"11px",fontWeight:"bold",letterSpacing:"2px",color:COLORS.lima}}>PHASE 2: INTERVIEW</div><h2 style={{fontSize:"18px",fontWeight:"bold",color:COLORS.white,margin:"4px 0"}}>Ask Bob Iger About His Leadership</h2><p style={{fontSize:"11px",color:COLORS.mist}}>Ask about any decision, principle, or challenge.</p></div><div style={{flex:1,overflowY:"auto",padding:"16px",maxWidth:"700px",margin:"0 auto",width:"100%",maxHeight:"50vh"}}>{msgs.length===0&&<div style={{textAlign:"center",padding:"24px 0"}}><p style={{fontSize:"13px",color:COLORS.shuttle,marginBottom:"12px"}}>Try asking about:</p><div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:"8px"}}>{["How did you convince Steve Jobs to sell Pixar?","What was your biggest leadership mistake?","Why did you come back from retirement?","What makes a good leader?","Are you a clock builder or time teller?"].map(q=><button key={q} onClick={()=>setInp(q)} style={{fontSize:"11px",padding:"6px 12px",borderRadius:"20px",border:`1px solid ${COLORS.orient}`,background:"transparent",color:COLORS.orient,cursor:"pointer"}}>{q}</button>)}</div></div>}{msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:"10px"}}><div style={{maxWidth:"420px",padding:"10px 14px",borderRadius:"16px",fontSize:"13px",background:m.role==="user"?COLORS.orient:COLORS.white,color:m.role==="user"?COLORS.white:COLORS.darkGray,border:m.role==="user"?"none":`1px solid ${COLORS.pebble}`}}>{m.role==="assistant"&&<div style={{fontSize:"11px",fontWeight:"bold",color:COLORS.forest,marginBottom:"4px"}}>Bob Iger</div>}{m.text}</div></div>)}<div ref={ref}/></div><div style={{padding:"12px",borderTop:`1px solid ${COLORS.pebble}`,maxWidth:"700px",margin:"0 auto",width:"100%"}}><div style={{display:"flex",gap:"8px"}}><input type="text" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ask Iger a question..." style={{flex:1,padding:"10px",borderRadius:"8px",border:`2px solid ${COLORS.pebble}`,fontSize:"13px",outline:"none"}}/><button onClick={send} disabled={!inp.trim()} style={{padding:"10px 20px",borderRadius:"8px",fontWeight:"bold",fontSize:"13px",background:COLORS.forest,color:COLORS.white,border:"none",cursor:"pointer",opacity:!inp.trim()?0.4:1}}>Send</button></div><div style={{textAlign:"center",marginTop:"10px"}}><button onClick={()=>setPhase("profile")} style={{padding:"8px 24px",borderRadius:"8px",fontWeight:"bold",fontSize:"13px",background:COLORS.lima,color:COLORS.forest,border:"none",cursor:"pointer"}}>View My Leadership Profile</button></div></div></div>;

  if(phase==="profile"){const sum=SCENARIOS.map((sc,i)=>{const ch=choices[i],mt=ch===sc.igerChoice;return{title:sc.title,act:sc.act,choice:ch!==null?String.fromCharCode(65+ch):"?",matched:mt,option:ch!==null?sc.options[ch]:null};});
  const descs={style:{democratic:"You favor consensus. Strong for innovation, may be slow in crisis.",authoritarian:"You favor decisive action. Effective in crisis, may erode trust.","laissez-faire":"You trust teams to self-direct. Great with experts, may appear disengaged."},conflict:{collaborating:"You seek win-win. Takes time but builds buy-in.",competing:"You push your position. Fast but creates resistance.",compromising:"Middle ground. Diplomatic but may leave both unsatisfied.",avoiding:"You sidestep conflict. Sometimes wise, issues may fester.",accommodating:"You yield to maintain relationships."},paradigm:{transformational:"You change culture, not just work within it.",visionary:"Clear direction around ambitious goals.",dispersed:"You distribute leadership and trust teams.",transactional:"Systems, goals, and rewards. Efficient but may limit innovation."}};
  return <div style={{minHeight:"100vh",padding:"16px",background:COLORS.offWhite}}><div style={{maxWidth:"700px",margin:"0 auto"}}><div style={{borderRadius:"12px",overflow:"hidden",border:`2px solid ${COLORS.forest}`,marginBottom:"20px"}}><div style={{padding:"16px",textAlign:"center",background:COLORS.cyprus}}><div style={{fontSize:"11px",fontWeight:"bold",letterSpacing:"3px",color:COLORS.lima}}>BUS 5001 | DISNEY LEADERSHIP SIMULATOR</div><h2 style={{fontSize:"24px",fontWeight:"bold",color:COLORS.white,margin:"6px 0"}}>{name}'s Leadership Profile</h2><p style={{fontSize:"11px",color:COLORS.mist}}>Based on 5 Disney CEO decisions + Iger interview</p></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}><div style={{padding:"14px",textAlign:"center",background:COLORS.forest}}><div style={{fontSize:"30px",fontWeight:"bold",color:COLORS.lima}}>{igerMatch}%</div><div style={{fontSize:"11px",color:COLORS.mist}}>Iger Alignment</div></div><div style={{padding:"14px",textAlign:"center",background:COLORS.orient}}><div style={{fontSize:"30px",fontWeight:"bold",color:COLORS.white}}>{profile.clockScore}/10</div><div style={{fontSize:"11px",color:COLORS.mist}}>{clockLabel}</div></div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",textAlign:"center",background:COLORS.white}}>{[{l:"STYLE",v:profile.topStyle,c:COLORS.forest},{l:"CONFLICT",v:profile.topConflict,c:COLORS.orient},{l:"PARADIGM",v:profile.topParadigm,c:COLORS.cyprus}].map((x,i)=><div key={i} style={{padding:"10px",borderRight:i<2?`1px solid ${COLORS.pebble}`:"none"}}><div style={{fontSize:"10px",fontWeight:"bold",letterSpacing:"1px",color:x.c,marginBottom:"4px"}}>{x.l}</div><div style={{fontSize:"13px",fontWeight:"bold",textTransform:"capitalize",color:COLORS.darkGray}}>{x.v}</div></div>)}</div><div style={{padding:"10px 14px",background:COLORS.offWhite}}><div style={{fontSize:"10px",fontWeight:"bold",letterSpacing:"1px",color:COLORS.shuttle,marginBottom:"6px"}}>YOUR 5 DECISIONS</div>{sum.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:"8px",fontSize:"11px",marginBottom:"3px"}}><span style={{width:"20px",height:"20px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold",fontSize:"10px",background:s.matched?COLORS.lima:COLORS.pebble,color:s.matched?COLORS.forest:COLORS.shuttle,flexShrink:0}}>{s.choice}</span><strong style={{color:COLORS.darkGray}}>{s.title}</strong><span style={{padding:"1px 6px",borderRadius:"3px",fontSize:"9px",background:COLORS.mist,color:COLORS.forest,flexShrink:0}}>{s.act}</span>{s.matched&&<span style={{fontSize:"9px",color:COLORS.lima,flexShrink:0}}>= Iger</span>}{s.option&&<span style={{marginLeft:"auto",textTransform:"capitalize",color:COLORS.shuttle,flexShrink:0}}>{s.option.style} / {s.option.paradigm}</span>}</div>)}</div><div style={{padding:"8px",textAlign:"center",background:COLORS.forest}}><span style={{fontSize:"11px",fontWeight:"bold",color:COLORS.lima}}>SCREENSHOT THIS CARD FOR YOUR RECORDS</span></div></div>
  {[{t:"LEADERSHIP STYLE",d:profile.styleCounts,c:COLORS.forest,k:"topStyle",ds:descs.style},{t:"CONFLICT-HANDLING MODE",d:profile.conflictCounts,c:COLORS.orient,k:"topConflict",ds:descs.conflict},{t:"LEADERSHIP PARADIGM",d:profile.paradigmCounts,c:COLORS.cyprus,k:"topParadigm",ds:descs.paradigm}].map((ch,i)=><div key={i} style={{padding:"14px",borderRadius:"12px",border:`1px solid ${COLORS.pebble}`,background:COLORS.white,marginBottom:"14px"}}><h3 style={{fontSize:"12px",fontWeight:"bold",color:ch.c,marginBottom:"10px"}}>{ch.t}</h3><BarChart data={ch.d} color={ch.c}/><div style={{marginTop:"10px",fontSize:"11px",padding:"8px",borderRadius:"4px",background:COLORS.mist+"40",color:COLORS.forest}}><strong>Your tendency:</strong> {profile[ch.k].charAt(0).toUpperCase()+profile[ch.k].slice(1)} — {ch.ds[profile[ch.k]]||"Balanced approach."}</div></div>)}
  <div style={{padding:"16px",borderRadius:"12px",border:`1px solid ${COLORS.pebble}`,background:COLORS.white,textAlign:"center",marginBottom:"14px"}}><h3 style={{fontSize:"12px",fontWeight:"bold",color:COLORS.forest,marginBottom:"10px"}}>CLOCK BUILDER vs. TIME TELLER</h3><div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"12px"}}><span style={{fontSize:"11px",fontWeight:"bold",color:COLORS.orient}}>Time Teller</span><div style={{width:"180px",height:"10px",borderRadius:"5px",background:COLORS.pebble}}><div style={{height:"100%",borderRadius:"5px",width:`${(profile.clockScore/10)*100}%`,background:`linear-gradient(to right,${COLORS.orient},${COLORS.lima})`,transition:"width 0.7s"}}/></div><span style={{fontSize:"11px",fontWeight:"bold",color:COLORS.lima}}>Clock Builder</span></div><div style={{fontSize:"16px",fontWeight:"bold",color:COLORS.forest,marginTop:"6px"}}>{clockLabel}</div><p style={{fontSize:"11px",color:COLORS.shuttle}}>Score: {profile.clockScore}/10</p></div>
  <div style={{padding:"14px",borderRadius:"12px",background:COLORS.mist,marginBottom:"14px"}}><div style={{fontSize:"10px",fontWeight:"bold",letterSpacing:"2px",color:COLORS.forest,marginBottom:"6px"}}>NEXT STEP</div><p style={{fontSize:"13px",color:COLORS.forest}}>Complete the reflection worksheet. Compare your profile to your focal company's leader. Submit screenshot + worksheet on Canvas.</p></div>
  <button onClick={()=>{setPhase("welcome");setChoices(Array(5).fill(null));setIdx(0);setMsgs([]);setShowExp(false);setName("");}} style={{width:"100%",padding:"12px",borderRadius:"8px",fontWeight:"bold",fontSize:"13px",background:COLORS.pebble,color:COLORS.darkGray,border:"none",cursor:"pointer"}}>Start Over</button></div></div>;}
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
