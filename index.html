const{useState,useRef,useEffect}=React;
const C={forest:"#154734",lima:"#72BF44",cyprus:"#003B49",mist:"#B1E4E3",orient:"#005F83",pebble:"#D6D1CA",white:"#FFFFFF",offWhite:"#F7F7F5",darkGray:"#333333",shuttle:"#63666A"};

const INTERVIEW_QUESTIONS=[
{category:"Acquisition Leadership",question:"How did you convince Steve Jobs to sell Pixar to Disney?",response:"The Pixar deal was really about building trust with Steve. I flew to Cupertino, sat with him, and listened to everything that frustrated him about Disney\u2019s previous leadership. I didn\u2019t lead with a number or a pitch. I led with respect for what Pixar had built. I promised creative independence, and I meant it. Steve became our largest individual shareholder and joined our board. That relationship became one of the most important of my career."},
{category:"Acquisition Leadership",question:"Why did you give Kevin Feige full autonomy at Marvel instead of integrating him into Disney\u2019s corporate structure?",response:"Marvel was a $4 billion bet, and Kevin had a vision for connecting all those characters into one universe. I gave him near-total creative autonomy because I believed the people who created the value are the ones who know how to keep creating it. He reported directly to me, not through the studio hierarchy. The MCU became the highest-grossing film franchise in history. The lesson: trust the talent you acquire."},
{category:"Acquisition Leadership",question:"What did you learn from convincing George Lucas to sell Lucasfilm?",response:"George was incredibly protective of Star Wars, as he should have been. I had to convince him we would honor his legacy while evolving it. That took multiple personal conversations demonstrating genuine respect for what he built. It wasn\u2019t a corporate negotiation; it was a relationship built on trust. He needed to know his life\u2019s work would be in good hands."},
{category:"Strategic Decisions",question:"Why did you go all-in on Disney+ instead of testing streaming cautiously?",response:"Launching Disney+ was the most important strategic decision of my tenure. I believed that if we didn\u2019t own the relationship with our audience, we would slowly become irrelevant. We pulled content from Netflix, sacrificed $150 million a year in licensing revenue, and bet the company\u2019s future. Wall Street punished us initially. But we hit 100 million subscribers in 16 months. Sometimes the biggest risk is not taking one."},
{category:"Strategic Decisions",question:"How do you make tough decisions when you don\u2019t have perfect information?",response:"I try to make decisions with the information available rather than waiting for perfect information, which never comes. I gather input from people I trust, think about second and third order consequences, and then commit. The worst thing a leader can do is sit in indecision. Even a wrong decision can often be corrected, but indecision creates anxiety and paralysis across the entire organization."},
{category:"Strategic Decisions",question:"Has Disney become better at buying innovation than building it? Is that a problem?",response:"I\u2019ll be honest: that\u2019s a fair criticism. Pixar, Marvel, Lucasfilm, Fox — all acquisitions. Our internal R&D like MagicBand was successful but those are process innovations, not breakthrough creative ones. The question of whether Disney can generate transformative innovation from within is one the company still needs to answer. A healthy company needs both capabilities."},
{category:"Style & Adaptation",question:"How do you decide when to be hands-on versus hands-off as a leader?",response:"The best leaders know when to be hands-on and when to step back. With acquisitions, I was very hands-on during negotiation and integration. But once creative leaders were in place and trusted, I stepped back. Kevin Feige didn\u2019t need me telling him how to make Marvel movies. He needed me to protect his autonomy from corporate interference. The key is reading the situation correctly."},
{category:"Style & Adaptation",question:"When you pulled content from Netflix, there was huge internal opposition. How did you handle that conflict?",response:"I generally prefer collaboration over confrontation, but there are times when you have to hold your ground. There was enormous internal opposition to the Netflix decision. People thought I was crazy to give up guaranteed revenue. I listened to every concern, acknowledged them respectfully, and then made the call. You can be respectful and still be decisive. That\u2019s not a contradiction."},
{category:"Style & Adaptation",question:"How did your leadership style change between running acquisitions and managing daily operations?",response:"During acquisitions I was intensely focused, personally involved in every detail. But daily operations required a completely different approach: setting the strategic direction, empowering the right people, and then trusting them to execute. The challenge is switching between those modes. Some leaders are great at one and terrible at the other. I tried to be intentional about which mode each situation required."},
{category:"Succession & Legacy",question:"Why did Disney struggle under Bob Chapek after you retired?",response:"I don\u2019t want to speak negatively about Bob. What I will say is that leadership transitions are one of the hardest things any organization faces. I take some responsibility for not ensuring a smoother handoff. Choosing and preparing a successor is one of the most important things a leader does, and I didn\u2019t do it well enough. That\u2019s a lesson I carry with me."},
{category:"Succession & Legacy",question:"You came back from retirement because Disney struggled without you. Does that make you a time teller rather than a clock builder?",response:"This is a question I wrestle with honestly. The fact that Disney struggled could mean I was a time teller. But I\u2019d push back slightly: the architecture I built — the acquisitions, the IP portfolio, the streaming platform — those are durable assets. The challenge was leadership succession, which is a different problem. I think you can build a great clock and still stumble on the handoff."},
{category:"Succession & Legacy",question:"What would you do differently if you could redo the CEO transition?",response:"I would have started the succession process much earlier and been more deliberate about developing multiple internal candidates. I would have created a longer overlap period where the successor could lead with me still available. And I would have been more honest with the board about the risks of the specific transition plan we chose. The hardest leadership lessons are the ones you learn too late."},
{category:"Values & Culture",question:"How did you rebuild employee morale when you returned in 2022?",response:"The first thing I did was dismantle the centralized structure that had stripped creative leaders of budget authority. The message under my predecessor was that financial discipline mattered more than creative excellence. I reversed that immediately. I held town halls, listened to people at every level, and made it clear that Disney\u2019s competitive advantage is storytelling culture. Culture is not a memo; it\u2019s what the leader does every day."},
{category:"Values & Culture",question:"What role does storytelling play in your own leadership, beyond Disney\u2019s products?",response:"Disney is fundamentally a storytelling company, but storytelling is also how I lead. When I set the three strategic priorities — great content, embrace technology, grow globally — that was a story about where we were going. When I explained the Disney+ decision to employees, I told the story of why standing still meant decline. People follow narratives, not spreadsheets. The leader\u2019s job is to be storyteller-in-chief."},
{category:"Conflict & Mistakes",question:"What was your biggest leadership mistake?",response:"One of my biggest regrets is not handling the leadership transition better when I retired. I should have spent more time preparing the organization for a post-Iger era. I was also too slow to recognize when content quality was slipping at Marvel because of the sheer volume of output. When you\u2019re producing too much too fast, quality suffers. A leader has to know when to say \u2018less but better.\u2019"},
{category:"Conflict & Mistakes",question:"You say optimism is your most important quality. Was there a time when optimism actually hurt your decision-making?",response:"That\u2019s a sharp question. Yes, I think optimism sometimes made me too patient with situations that needed more urgency. I was optimistic that the streaming losses would resolve faster than they did. I was optimistic that the Marvel content pipeline could maintain quality at high volume. Optimism is essential, but it has to be paired with the courage to confront uncomfortable realities. Blind optimism is just denial."},
{category:"Personal Philosophy",question:"What are your core leadership principles?",response:"Optimism, courage, and decisiveness. Optimism because people don\u2019t follow pessimists. Courage because the most important decisions are always the hardest. Decisiveness because indecision is corrosive. Over time I added fairness and thoughtfulness. But those original three are the foundation. They sound simple, but living them under pressure every day is extraordinarily difficult."},
{category:"Personal Philosophy",question:"What advice would you give a young person who wants to be a leader?",response:"Be genuinely curious, take risks early when the consequences of failure are smallest, and never stop learning. I started as a weatherman at a local ABC station. I never imagined I\u2019d run Disney. At every step, I tried to learn as much as I could and build real relationships. And always choose optimism. People want to follow leaders who believe great things are possible."},
{category:"Personal Philosophy",question:"What does trust mean to you as a leader, and how do you build it?",response:"Trust is everything. You build it through consistency: doing what you say you\u2019re going to do, every time. With Steve Jobs, George Lucas, Kevin Feige, it was always about honoring my commitments. Trust takes years to build and seconds to destroy. In an organization, trust creates psychological safety — people take creative risks because they know failure won\u2019t be punished. Without trust, innovation dies."},
{category:"Personal Philosophy",question:"In an entrepreneurial organization, should authority come from position or from something else?",response:"Authority should come from your expertise and values, not your title. I tried to lead that way. Yes, I was CEO, but the reason people followed my direction was because they trusted my judgment and believed in where we were going. The moment a leader relies on positional authority alone, they\u2019ve already lost. The best leaders earn followership every day."},
];

const SCENARIOS=[
{id:1,title:"The Pixar Acquisition",act:"ALIGN",context:"It is 2006. Disney Animation is struggling with flops. Pixar, led by Steve Jobs, is the hottest studio in Hollywood. Your team says acquiring Pixar could revive Disney Animation, but Jobs is notoriously difficult to negotiate with and the price tag ($7.4B) is enormous. How do you approach this?",options:[{text:"Send your M&A team to negotiate hard on price. This is a business deal.",style:"transactional",conflict:"competing",paradigm:"transactional",clock:0},{text:"Meet Jobs personally. Listen to what he cares about, and build the deal around protecting Pixar\u2019s culture.",style:"democratic",conflict:"collaborating",paradigm:"transformational",clock:2},{text:"Make a bold public offer to pressure Jobs into a deal via media attention.",style:"authoritarian",conflict:"competing",paradigm:"visionary",clock:0},{text:"Invest in building Disney Animation internally instead. Hire Pixar talent one by one.",style:"laissez-faire",conflict:"avoiding",paradigm:"transactional",clock:1}],igerChoice:1,igerExplanation:"Iger chose to build personal trust with Jobs first. He flew to Cupertino, listened to Jobs\u2019s frustrations, and structured the deal to protect Pixar\u2019s creative independence completely. Jobs became Disney\u2019s largest shareholder and board member."},
{id:2,title:"The Fox Mega-Acquisition",act:"ALIGN",context:"It is 2017. 21st Century Fox is available for $71 billion — the most expensive acquisition in entertainment history. It would give you the content library needed for streaming (Avatar, X-Men, The Simpsons), but integration risk is massive. You would be absorbing 25,000+ employees and fundamentally changing Disney\u2019s scale. Comcast is also circling.",options:[{text:"Pass on Fox. The integration risk is too high and the price too steep. Focus on growing what you already own.",style:"laissez-faire",conflict:"avoiding",paradigm:"transactional",clock:1},{text:"Move aggressively to acquire Fox. The content library is essential for the streaming future. Pay whatever it takes to beat Comcast.",style:"authoritarian",conflict:"competing",paradigm:"visionary",clock:1},{text:"Acquire Fox but negotiate a phased integration plan that protects both cultures during the transition.",style:"democratic",conflict:"collaborating",paradigm:"transformational",clock:2},{text:"Propose a joint venture with Fox instead of a full acquisition. Get access to the content without the integration burden.",style:"democratic",conflict:"compromising",paradigm:"dispersed",clock:1}],igerChoice:1,igerExplanation:"Iger moved decisively to acquire Fox for $71 billion, outbidding Comcast. He saw it as the final piece needed for the streaming strategy: a massive content library that would make Disney+ instantly competitive. The integration was brutal, but Iger believed the strategic necessity outweighed the short-term pain."},
{id:3,title:"The Streaming Gamble",act:"ADAPT",context:"It is 2018. Netflix is disrupting entertainment. Disney\u2019s content is spread across third-party platforms generating reliable licensing revenue. Your team proposes pulling ALL Disney content and launching Disney+. This means sacrificing billions in guaranteed revenue with no guarantee the platform will succeed.",options:[{text:"Move cautiously. Keep licensing deals while testing a small streaming product.",style:"laissez-faire",conflict:"avoiding",paradigm:"transactional",clock:1},{text:"Go all-in. Pull content from Netflix, reorganize the company around streaming, accept short-term losses.",style:"authoritarian",conflict:"competing",paradigm:"visionary",clock:2},{text:"Form a joint venture with a tech company to share the risk and leverage their infrastructure.",style:"democratic",conflict:"compromising",paradigm:"dispersed",clock:1},{text:"Acquire an existing streaming platform rather than building from scratch.",style:"democratic",conflict:"collaborating",paradigm:"transformational",clock:1}],igerChoice:1,igerExplanation:"Iger went all-in on Disney+. He reorganized the entire company around streaming, pulled content from Netflix (sacrificing ~$150M/year), and invested billions. Disney+ hit 100 million subscribers in 16 months. He called it the most important decision of his tenure."},
{id:4,title:"Creative Autonomy vs. Corporate Control",act:"ALIGN",context:"You have just acquired Marvel. Kevin Feige has a bold vision for an interconnected cinematic universe never attempted before. Your corporate team wants Marvel to follow Disney\u2019s standard processes for budgeting, marketing, and scheduling. Feige says those processes will kill the creative vision. Who do you back?",options:[{text:"Back the corporate team. Disney has proven systems. Marvel needs to integrate.",style:"authoritarian",conflict:"competing",paradigm:"transactional",clock:0},{text:"Back Feige completely. Give Marvel near-total creative and operational autonomy.",style:"laissez-faire",conflict:"accommodating",paradigm:"dispersed",clock:2},{text:"Create a hybrid: Marvel keeps creative autonomy but uses Disney\u2019s distribution and financial systems.",style:"democratic",conflict:"collaborating",paradigm:"transformational",clock:2},{text:"Set up a formal review process where Marvel pitches to Disney leadership for approval.",style:"democratic",conflict:"compromising",paradigm:"transactional",clock:0}],igerChoice:1,igerExplanation:"Iger gave Feige near-total autonomy. Marvel operated almost independently, with Feige reporting directly to Iger. The MCU became the highest-grossing film franchise in history ($29B+). Iger\u2019s insight: \u2018The people who created the value are the ones who know how to keep creating it.\u2019"},
{id:5,title:"Marvel Content Overload",act:"ADAPT",context:"It is 2022. Marvel has released 7 films and 6 Disney+ series in just 18 months. Critics are calling it \u2018superhero fatigue.\u2019 Audience scores are declining. Internal teams are burned out. Some argue that the volume is necessary to feed Disney+ subscribers; others say you are diluting the brand that took a decade to build. What do you do?",options:[{text:"Maintain the current pace. Disney+ needs content, and the Marvel brand can handle the volume. Subscriber growth depends on it.",style:"authoritarian",conflict:"competing",paradigm:"transactional",clock:0},{text:"Dramatically cut the slate. Fewer but higher-quality releases. Accept that Disney+ will have content gaps.",style:"democratic",conflict:"collaborating",paradigm:"transformational",clock:2},{text:"Let Kevin Feige decide. He built the MCU; he knows the right pace better than corporate.",style:"laissez-faire",conflict:"accommodating",paradigm:"dispersed",clock:2},{text:"Reduce the Disney+ series but maintain the theatrical film pace. Theaters are where Marvel\u2019s brand was built.",style:"democratic",conflict:"compromising",paradigm:"visionary",clock:1}],igerChoice:1,igerExplanation:"When Iger returned, he publicly committed to \u2018fewer but better\u2019 releases across Disney, including Marvel. He acknowledged that the volume had diluted quality. This was a rare case where Iger admitted a strategic mistake and corrected course, showing that adaptability is as important as vision."},
{id:6,title:"The Chapek Crisis",act:"ARCHITECT",context:"It is November 2022. You retired in February 2020 and handed the CEO role to Bob Chapek. Under Chapek, Disney\u2019s stock has fallen 40%, creative talent is leaving, and employee morale is at a low. The board calls and asks you to come back. You are 71 years old and enjoying retirement.",options:[{text:"Decline. You built the clock; it should work without you. The board needs to find someone new.",style:"laissez-faire",conflict:"avoiding",paradigm:"dispersed",clock:2},{text:"Return as CEO with a clear mandate and defined term to find and mentor a proper successor.",style:"authoritarian",conflict:"competing",paradigm:"visionary",clock:1},{text:"Return as Executive Chairman, not CEO. Advise and mentor a new CEO candidate.",style:"democratic",conflict:"collaborating",paradigm:"dispersed",clock:2},{text:"Agree to return only if given full authority to restructure. No half-measures.",style:"authoritarian",conflict:"competing",paradigm:"transformational",clock:0}],igerChoice:1,igerExplanation:"Iger returned as CEO with a clear mandate but also a clear timeline. He restructured the company, restored creative leadership authority, and began the search for a successor. Some saw this as proof he was a \u2018time teller\u2019; others argued the board hadn\u2019t built leadership depth."},
{id:7,title:"The $60 Billion Parks Bet",act:"ARCHITECT",context:"It is 2023. You are considering a $60 billion, 10-year parks expansion — the largest capital commitment in Disney\u2019s history. The parks division is your most profitable segment, but tech companies are betting on virtual reality and AR experiences. Some board members question whether physical theme parks are the future when the metaverse is coming. Where do you invest?",options:[{text:"Scale back parks investment. Redirect capital toward technology, streaming, and digital experiences where the future is heading.",style:"laissez-faire",conflict:"avoiding",paradigm:"transactional",clock:1},{text:"Go all-in on the $60B parks expansion. Physical experiences cannot be replicated by tech companies. This is Disney\u2019s moat.",style:"authoritarian",conflict:"competing",paradigm:"visionary",clock:1},{text:"Split the investment: $40B for parks expansion and $20B for a new technology and digital experiences division.",style:"democratic",conflict:"compromising",paradigm:"transformational",clock:2},{text:"Commit to the parks expansion but create an internal innovation lab to prototype AR/VR experiences that integrate with the physical parks.",style:"democratic",conflict:"collaborating",paradigm:"dispersed",clock:2}],igerChoice:1,igerExplanation:"Iger announced the full $60 billion parks investment, calling it a bet on something tech companies cannot replicate: immersive physical experiences. His logic was classic strategic intent — the gap between Disney\u2019s physical experience capability and anyone else\u2019s was Disney\u2019s strongest competitive moat. But he also acknowledged that pricing strategy needed to ensure families weren\u2019t priced out."},
{id:8,title:"The ESPN Bet",act:"ADAPT",context:"It is 2023. ESPN is Disney\u2019s most valuable media asset but cable subscribers are declining rapidly. Sports betting is exploding as a market. Your team proposes transforming ESPN into a sports betting platform, but this fundamentally changes Disney\u2019s family-friendly brand identity and requires capabilities Disney has never built.",options:[{text:"Keep ESPN focused on sports media. The brand risk of gambling is too high for Disney.",style:"laissez-faire",conflict:"avoiding",paradigm:"transactional",clock:1},{text:"Launch ESPN Bet aggressively with internal capabilities. The future of sports media IS betting.",style:"authoritarian",conflict:"competing",paradigm:"visionary",clock:1},{text:"Partner with an established betting company. License the ESPN brand but let experts handle operations.",style:"democratic",conflict:"collaborating",paradigm:"transformational",clock:2},{text:"Test betting features in one market first. Gather data before committing the full brand.",style:"democratic",conflict:"compromising",paradigm:"transactional",clock:1}],igerChoice:2,igerExplanation:"Iger partnered with Penn Entertainment, licensing the ESPN brand while letting Penn handle gambling operations. This protected Disney\u2019s family brand while capturing the opportunity. A classic dispersed leadership move: trust a partner with expertise you lack, maintain brand control, share risk."},
];

function computeProfile(ch){const s={"laissez-faire":0,democratic:0,authoritarian:0},c={competing:0,collaborating:0,compromising:0,avoiding:0,accommodating:0},p={transactional:0,transformational:0,visionary:0,dispersed:0};let cl=0,m=0;ch.forEach((v,i)=>{if(v!==null){const o=SCENARIOS[i].options[v];s[o.style]++;c[o.conflict]++;p[o.paradigm]++;cl+=o.clock;if(v===SCENARIOS[i].igerChoice)m++;}});const ts=Object.entries(s).sort((a,b)=>b[1]-a[1])[0],tc=Object.entries(c).sort((a,b)=>b[1]-a[1])[0],tp=Object.entries(p).sort((a,b)=>b[1]-a[1])[0];return{styleCounts:s,conflictCounts:c,paradigmCounts:p,clockScore:cl,matchCount:m,topStyle:ts[0],topConflict:tc[0],topParadigm:tp[0]};}
function BarChart({data,color}){const max=Math.max(...Object.values(data),1);return<div style={{display:"flex",flexDirection:"column",gap:"8px"}}>{Object.entries(data).map(([k,v])=><div key={k} style={{display:"flex",alignItems:"center",gap:"8px"}}><span style={{fontSize:"11px",width:"110px",textAlign:"right",textTransform:"capitalize",color:C.shuttle}}>{k}</span><div style={{flex:1,height:"18px",borderRadius:"3px",background:C.pebble+"40"}}><div style={{height:"100%",borderRadius:"3px",width:`${(v/max)*100}%`,background:color,minWidth:v>0?"8px":"0",transition:"width 0.7s"}}/></div><span style={{fontSize:"11px",width:"16px",fontWeight:"bold",color}}>{v}</span></div>)}</div>;}

function Notepad({notes,setNotes}){
  const[open,setOpen]=useState(false);
  return(<div style={{position:"fixed",bottom:"16px",right:"16px",zIndex:1000}}>
    {open&&<div style={{width:"320px",height:"280px",background:C.white,border:`2px solid ${C.forest}`,borderRadius:"12px",boxShadow:"0 4px 20px rgba(0,0,0,0.15)",marginBottom:"8px",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"8px 12px",background:C.forest,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:"12px",fontWeight:"bold",color:C.lima}}>MY NOTES</span><span style={{fontSize:"10px",color:C.mist}}>These stay with you through all phases</span></div>
      <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Jot down key insights, surprising decisions, and questions for your reflection..." style={{flex:1,padding:"10px",border:"none",resize:"none",fontSize:"12px",fontFamily:"Arial",color:C.darkGray,background:C.offWhite}}/>
    </div>}
    <button onClick={()=>setOpen(!open)} style={{width:"48px",height:"48px",borderRadius:"50%",background:C.forest,color:C.lima,border:"none",cursor:"pointer",fontSize:"20px",boxShadow:"0 2px 10px rgba(0,0,0,0.2)",display:"flex",alignItems:"center",justifyContent:"center"}}>{open?"\u2715":"\u270E"}</button>
  </div>);
}

function PhaseReminder({items,onContinue,btnText}){
  return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",background:C.cyprus}}>
    <div style={{maxWidth:"560px",width:"100%",textAlign:"center"}}>
      <div style={{fontSize:"11px",fontWeight:"bold",letterSpacing:"3px",color:C.lima,marginBottom:"12px"}}>BEFORE YOU MOVE ON</div>
      <h2 style={{fontSize:"26px",fontWeight:"bold",color:C.white,margin:"0 0 8px"}}>Record Your Key Takeaways</h2>
      <p style={{fontSize:"14px",color:C.mist,marginBottom:"24px"}}>Use the notepad (bottom right) or your worksheet to capture these before continuing:</p>
      <div style={{textAlign:"left",background:C.forest,borderRadius:"12px",padding:"20px",marginBottom:"24px"}}>
        {items.map((item,i)=><div key={i} style={{display:"flex",gap:"10px",marginBottom:"10px",alignItems:"flex-start"}}>
          <span style={{color:C.lima,fontWeight:"bold",fontSize:"14px",flexShrink:0}}>{i+1}.</span>
          <span style={{color:C.mist,fontSize:"13px",lineHeight:1.5}}>{item}</span>
        </div>)}
      </div>
      <button onClick={onContinue} style={{padding:"12px 32px",borderRadius:"8px",fontWeight:"bold",fontSize:"15px",background:C.lima,color:C.forest,border:"none",cursor:"pointer"}}>{btnText}</button>
    </div>
  </div>);
}

function App(){
  const[phase,setPhase]=useState("welcome");const[name,setName]=useState("");const[idx,setIdx]=useState(0);
  const[choices,setChoices]=useState(Array(8).fill(null));const[showExp,setShowExp]=useState(false);
  const[msgs,setMsgs]=useState([]);const[askedQs,setAskedQs]=useState(new Set());const[showCats,setShowCats]=useState(null);
  const[notes,setNotes]=useState("");
  const ref=useRef(null);
  useEffect(()=>{ref.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  const pick=(i)=>{const n=[...choices];n[idx]=i;setChoices(n);setShowExp(true);};
  const next=()=>{setShowExp(false);if(idx<7)setIdx(idx+1);else setPhase("reminder1");};
  const askQuestion=(qIdx)=>{const q=INTERVIEW_QUESTIONS[qIdx];setAskedQs(prev=>{const n=new Set(prev);n.add(qIdx);return n;});setMsgs(prev=>[...prev,{role:"user",text:q.question}]);setTimeout(()=>{setMsgs(prev=>[...prev,{role:"assistant",text:q.response}]);},500+Math.random()*600);};
  const profile=computeProfile(choices);
  const clockLabel=profile.clockScore>=11?"Strong Clock Builder":profile.clockScore>=6?"Balanced":"Time Teller Tendency";
  const igerMatch=Math.round((profile.matchCount/8)*100);
  const categories=[...new Set(INTERVIEW_QUESTIONS.map(q=>q.category))];

  // ── WELCOME ──
  if(phase==="welcome") return(
    <div style={{minHeight:"100vh",background:C.cyprus}}>
      <Notepad notes={notes} setNotes={setNotes}/>
      <div style={{maxWidth:"680px",margin:"0 auto",padding:"32px 24px"}}>
        <div style={{textAlign:"center",marginBottom:"32px"}}>
          <div style={{fontSize:"11px",fontWeight:"bold",letterSpacing:"3px",color:C.lima}}>BUS 5001 | WEEK 9 CASE STUDY</div>
          <h1 style={{fontSize:"36px",fontWeight:"bold",color:C.white,margin:"12px 0"}}>Disney Leadership Simulator</h1>
          <p style={{fontSize:"15px",color:C.mist,lineHeight:1.6}}>Step into Bob Iger's shoes. Make real leadership decisions. Interview him about his approach. Discover your own leadership style.</p>
        </div>

        {/* Context */}
        <div style={{background:C.forest,borderRadius:"12px",padding:"20px",marginBottom:"20px"}}>
          <div style={{fontSize:"11px",fontWeight:"bold",letterSpacing:"2px",color:C.lima,marginBottom:"8px"}}>CASE BACKGROUND</div>
          <p style={{fontSize:"13px",color:C.mist,lineHeight:1.6,margin:0}}>Bob Iger served as CEO of The Walt Disney Company from 2005 to 2020, transforming a legacy animation studio into the world's dominant entertainment conglomerate. He acquired Pixar, Marvel, Lucasfilm, and 21st Century Fox, launched Disney+, and grew Disney's market cap from $48B to over $250B. When his successor struggled, the board asked Iger to return in November 2022. His leadership decisions provide a masterclass in the Chapter 9 frameworks: leadership style adaptation, contingency theory, storytelling, the four paradigms, and the tension between being a "time teller" and a "clock builder."</p>
        </div>

        {/* What You'll Do */}
        <div style={{background:C.orient,borderRadius:"12px",padding:"20px",marginBottom:"20px"}}>
          <div style={{fontSize:"11px",fontWeight:"bold",letterSpacing:"2px",color:C.lima,marginBottom:"12px"}}>WHAT YOU WILL DO</div>
          <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
            {[{ph:"PHASE 1",t:"8 Decision Scenarios",d:"Face real Iger-era Disney crises. Each maps to the Align/Adapt/Architect framework. After each choice, see what Iger actually did.",tm:"~22 min"},
              {ph:"PHASE 2",t:"Interview Bob Iger",d:"Choose 5-8 questions from a curated list across 7 categories. Iger responds with verified facts from his memoir and public record.",tm:"~8 min"},
              {ph:"PHASE 3",t:"Your Leadership Profile",d:"Receive your personal profile: dominant style, conflict mode, paradigm, clock-builder score, and Iger alignment percentage. Screenshot for submission.",tm:"~2 min"}
            ].map((p,i)=><div key={i} style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
              <div style={{background:C.lima,color:C.forest,borderRadius:"6px",padding:"4px 10px",fontSize:"11px",fontWeight:"bold",flexShrink:0}}>{p.ph}</div>
              <div style={{flex:1}}><div style={{fontSize:"14px",fontWeight:"bold",color:C.white}}>{p.t}</div><div style={{fontSize:"12px",color:C.mist,marginTop:"2px"}}>{p.d}</div></div>
            </div>)}
          </div>
        </div>

        {/* Submission */}
        <div style={{background:C.forest,borderRadius:"12px",padding:"20px",marginBottom:"20px"}}>
          <div style={{fontSize:"11px",fontWeight:"bold",letterSpacing:"2px",color:C.lima,marginBottom:"8px"}}>SUBMISSION REQUIREMENTS</div>
          <div style={{fontSize:"13px",color:C.mist,lineHeight:1.6}}>
            <p style={{margin:"0 0 6px"}}><strong style={{color:C.white}}>1. Screenshot</strong> of your Leadership Profile card (Phase 3)</p>
            <p style={{margin:"0 0 6px"}}><strong style={{color:C.white}}>2. Completed Reflection Worksheet</strong> (5 questions, 3-5 sentences each, connecting to Chapter 9 frameworks)</p>
            <p style={{margin:"6px 0 0",color:C.lima,fontWeight:"bold"}}>Upload both to the Session 9.3 assignment on Canvas.</p>
          </div>
        </div>

        {/* Tips */}
        <div style={{background:C.mist+"30",borderRadius:"12px",padding:"16px",marginBottom:"24px",borderLeft:`4px solid ${C.lima}`}}>
          <div style={{fontSize:"12px",fontWeight:"bold",color:C.lima,marginBottom:"6px"}}>TIPS FOR SUCCESS</div>
          <div style={{fontSize:"12px",color:C.mist,lineHeight:1.6}}>
            <p style={{margin:"0 0 4px"}}>- <strong style={{color:C.white}}>Take notes</strong> as you go using the notepad button (bottom right corner). You will need specific details for your reflection.</p>
            <p style={{margin:"0 0 4px"}}>- <strong style={{color:C.white}}>Read each scenario fully</strong> before choosing. There are no wrong answers, but your pattern reveals your instincts.</p>
            <p style={{margin:"0 0 4px"}}>- <strong style={{color:C.white}}>In the interview</strong>, pick questions from at least 3 different categories for breadth.</p>
            <p style={{margin:"0"}}>- <strong style={{color:C.white}}>Pay attention to where you differ from Iger</strong> — that is your richest reflection material.</p>
          </div>
        </div>

        {/* Name + Start */}
        <div style={{textAlign:"center"}}>
          <input type="text" placeholder="Enter your full name" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&name.trim()&&setPhase("scenarios")} style={{width:"100%",maxWidth:"400px",padding:"14px",borderRadius:"8px",textAlign:"center",fontSize:"16px",background:C.forest,border:`2px solid ${C.lima}40`,color:C.white,marginBottom:"12px"}}/>
          <br/>
          <button onClick={()=>name.trim()&&setPhase("scenarios")} disabled={!name.trim()} style={{padding:"14px 48px",borderRadius:"8px",fontWeight:"bold",fontSize:"16px",background:C.lima,color:C.forest,border:"none",cursor:"pointer",opacity:name.trim()?1:0.4}}>Begin Phase 1: Decision Scenarios</button>
        </div>
      </div>
    </div>);

  // ── SCENARIOS ──
  if(phase==="scenarios"){const sc=SCENARIOS[idx];return(
    <div style={{minHeight:"100vh",padding:"16px",background:C.offWhite}}>
      <Notepad notes={notes} setNotes={setNotes}/>
      <div style={{maxWidth:"700px",margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"12px"}}>
          <span style={{fontSize:"11px",fontWeight:"bold",letterSpacing:"2px",color:C.orient}}>DECISION {idx+1} OF 8</span>
          <span style={{fontSize:"11px",padding:"2px 8px",borderRadius:"4px",fontWeight:"bold",background:C.mist,color:C.forest}}>{sc.act}</span>
        </div>
        <div style={{width:"100%",height:"4px",borderRadius:"2px",background:C.pebble,marginBottom:"20px"}}><div style={{height:"100%",borderRadius:"2px",width:`${((idx+1)/8)*100}%`,background:C.lima,transition:"width 0.5s"}}/></div>
        <h2 style={{fontSize:"24px",fontWeight:"bold",color:C.forest,marginBottom:"12px"}}>{sc.title}</h2>
        <p style={{color:C.darkGray,lineHeight:1.6,marginBottom:"20px"}}>{sc.context}</p>
        <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
          {sc.options.map((opt,i)=>{const ch=choices[idx]===i,ig=showExp&&i===sc.igerChoice;return(
            <button key={i} onClick={()=>!showExp&&pick(i)} disabled={showExp} style={{width:"100%",textAlign:"left",padding:"14px",borderRadius:"8px",border:`2px solid ${ig?C.lima:ch?C.orient:C.pebble}`,background:ch?(ig?C.lima+"20":C.orient+"15"):C.white,opacity:showExp&&!ch&&!ig?0.5:1,cursor:showExp?"default":"pointer"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:"10px"}}>
                <span style={{fontWeight:"bold",fontSize:"16px",color:ig?C.lima:ch?C.orient:C.shuttle}}>{String.fromCharCode(65+i)}</span>
                <div><p style={{color:C.darkGray,margin:0}}>{opt.text}</p>
                  {ch&&<span style={{display:"inline-block",marginTop:"6px",fontSize:"11px",fontWeight:"bold",padding:"2px 8px",borderRadius:"4px",background:C.orient,color:C.white}}>YOUR CHOICE</span>}
                  {ig&&<span style={{display:"inline-block",marginTop:"6px",marginLeft:"4px",fontSize:"11px",fontWeight:"bold",padding:"2px 8px",borderRadius:"4px",background:C.lima,color:C.forest}}>IGER'S CHOICE</span>}
                </div></div></button>);})}
        </div>
        {showExp&&<div style={{marginTop:"20px",padding:"16px",borderRadius:"8px",borderLeft:`4px solid ${C.forest}`,background:C.mist+"40"}}>
          <div style={{fontSize:"11px",fontWeight:"bold",letterSpacing:"2px",color:C.forest,marginBottom:"8px"}}>WHAT IGER ACTUALLY DID</div>
          <p style={{fontSize:"13px",lineHeight:1.6,color:C.darkGray}}>{sc.igerExplanation}</p>
          <button onClick={next} style={{marginTop:"12px",padding:"8px 20px",borderRadius:"8px",fontWeight:"bold",fontSize:"13px",background:C.forest,color:C.white,border:"none",cursor:"pointer"}}>{idx<7?"Next Decision":"Complete Phase 1"}</button>
        </div>}
      </div></div>);}

  // ── REMINDER 1 (between Phase 1 and Phase 2) ──
  if(phase==="reminder1") return <><Notepad notes={notes} setNotes={setNotes}/><PhaseReminder
    items={["Which decision surprised you the most? Where did you differ from Iger?","Note your Iger alignment so far (you matched on "+profile.matchCount+" of 8 decisions).","Which framework category (Align/Adapt/Architect) felt most natural to you?","Record any specific Iger explanations you want to reference in your reflection."]}
    onContinue={()=>setPhase("interview")} btnText="Continue to Phase 2: Interview Iger"/></>;

  // ── INTERVIEW ──
  if(phase==="interview") return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:C.offWhite}}>
      <Notepad notes={notes} setNotes={setNotes}/>
      <div style={{padding:"12px",textAlign:"center",background:C.cyprus}}>
        <div style={{fontSize:"11px",fontWeight:"bold",letterSpacing:"2px",color:C.lima}}>PHASE 2: INTERVIEW BOB IGER</div>
        <h2 style={{fontSize:"18px",fontWeight:"bold",color:C.white,margin:"4px 0"}}>Choose 5-8 Questions to Ask</h2>
        <p style={{fontSize:"11px",color:C.mist}}>Select from 7 categories. Pick questions from at least 3 different categories for breadth.</p>
        <div style={{marginTop:"6px",fontSize:"13px",fontWeight:"bold",color:askedQs.size>=5?C.lima:C.mist}}>{askedQs.size} of 20 questions asked{askedQs.size>=5&&askedQs.size<8?" — minimum met!":askedQs.size>=8?" — great depth!":""}</div>
      </div>
      <div style={{flex:1,display:"flex",maxWidth:"900px",margin:"0 auto",width:"100%",gap:"12px",padding:"12px",overflow:"hidden"}}>
        <div style={{width:"340px",flexShrink:0,overflowY:"auto",maxHeight:"calc(100vh - 180px)"}}>
          <div style={{fontSize:"11px",fontWeight:"bold",color:C.shuttle,marginBottom:"8px",letterSpacing:"1px"}}>QUESTION CATEGORIES</div>
          {categories.map(cat=>{const catQs=INTERVIEW_QUESTIONS.map((q,i)=>({...q,idx:i})).filter(q=>q.category===cat);const isOpen=showCats===cat;const asked=catQs.filter(q=>askedQs.has(q.idx)).length;return(
            <div key={cat} style={{marginBottom:"6px"}}>
              <button onClick={()=>setShowCats(isOpen?null:cat)} style={{width:"100%",textAlign:"left",padding:"8px 12px",borderRadius:"6px",border:`1px solid ${C.pebble}`,background:isOpen?C.forest:C.white,color:isOpen?C.white:C.darkGray,cursor:"pointer",fontSize:"12px",fontWeight:"bold",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>{cat}</span><span style={{fontSize:"10px",color:isOpen?C.lima:C.shuttle}}>{asked}/{catQs.length}</span></button>
              {isOpen&&<div style={{padding:"4px 0"}}>{catQs.map(q=>{const a=askedQs.has(q.idx);return <button key={q.idx} onClick={()=>!a&&askQuestion(q.idx)} disabled={a} style={{width:"100%",textAlign:"left",padding:"8px 10px",margin:"3px 0",borderRadius:"6px",border:"none",background:a?C.mist+"60":C.offWhite,color:a?C.shuttle:C.orient,cursor:a?"default":"pointer",fontSize:"12px",lineHeight:1.4,opacity:a?0.7:1}}>{a?"\u2713 ":""}{q.question}</button>;})}</div>}
            </div>);})}
        </div>
        <div style={{flex:1,overflowY:"auto",maxHeight:"calc(100vh - 180px)",padding:"4px"}}>
          {msgs.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:C.shuttle,fontSize:"13px"}}><p style={{fontWeight:"bold",marginBottom:"8px"}}>Select questions from the categories on the left.</p><p>Choose at least 5 questions from at least 3 different categories.</p></div>}
          {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:"10px"}}><div style={{maxWidth:"420px",padding:"10px 14px",borderRadius:"16px",fontSize:"13px",lineHeight:1.5,background:m.role==="user"?C.orient:C.white,color:m.role==="user"?C.white:C.darkGray,border:m.role==="user"?"none":`1px solid ${C.pebble}`}}>{m.role==="assistant"&&<div style={{fontSize:"11px",fontWeight:"bold",color:C.forest,marginBottom:"4px"}}>Bob Iger</div>}{m.text}</div></div>)}
          <div ref={ref}/>
        </div>
      </div>
      <div style={{padding:"10px",textAlign:"center",borderTop:`1px solid ${C.pebble}`}}>
        <button onClick={()=>setPhase("reminder2")} disabled={askedQs.size<5} style={{padding:"10px 28px",borderRadius:"8px",fontWeight:"bold",fontSize:"14px",background:askedQs.size>=5?C.lima:C.pebble,color:askedQs.size>=5?C.forest:C.shuttle,border:"none",cursor:askedQs.size>=5?"pointer":"default",opacity:askedQs.size>=5?1:0.6}}>{askedQs.size<5?`Ask ${5-askedQs.size} more question${5-askedQs.size>1?"s":""} to continue`:"Complete Phase 2"}</button>
      </div>
    </div>);

  // ── REMINDER 2 (between Phase 2 and Profile) ──
  if(phase==="reminder2") return <><Notepad notes={notes} setNotes={setNotes}/><PhaseReminder
    items={["What was the most insightful answer Iger gave? (You will need this for Reflection Q4.)","Did any of Iger\u2019s answers change how you think about one of your decisions?","Note any answer where you think Iger oversimplified or where you would push back using Chapter 9 frameworks.","Record at least one connection between Iger\u2019s approach and your focal company\u2019s leader."]}
    onContinue={()=>setPhase("profile")} btnText="View My Leadership Profile"/></>;

  // ── PROFILE ──
  if(phase==="profile"){
    const sum=SCENARIOS.map((sc,i)=>{const ch=choices[i],mt=ch===sc.igerChoice;return{title:sc.title,act:sc.act,choice:ch!==null?String.fromCharCode(65+ch):"?",matched:mt,option:ch!==null?sc.options[ch]:null};});
    const descs={style:{democratic:"You favor consensus. Strong for innovation, may be slow in crisis.",authoritarian:"You favor decisive action. Effective in crisis, may erode trust.","laissez-faire":"You trust teams to self-direct. Great with experts, may appear disengaged."},conflict:{collaborating:"You seek win-win. Takes time but builds buy-in.",competing:"You push your position. Fast but creates resistance.",compromising:"Middle ground. Diplomatic but may leave both unsatisfied.",avoiding:"You sidestep conflict. Sometimes wise, issues may fester.",accommodating:"You yield to maintain relationships."},paradigm:{transformational:"You change culture, not just work within it.",visionary:"Clear direction around ambitious goals.",dispersed:"You distribute leadership and trust teams.",transactional:"Systems, goals, and rewards. Efficient but may limit innovation."}};
    return(
    <div style={{minHeight:"100vh",padding:"16px",background:C.offWhite}}>
      <Notepad notes={notes} setNotes={setNotes}/>
      <div style={{maxWidth:"700px",margin:"0 auto"}}>
        {/* Screenshot Card */}
        <div style={{borderRadius:"12px",overflow:"hidden",border:`2px solid ${C.forest}`,marginBottom:"20px"}}>
          <div style={{padding:"16px",textAlign:"center",background:C.cyprus}}>
            <div style={{fontSize:"11px",fontWeight:"bold",letterSpacing:"3px",color:C.lima}}>BUS 5001 | DISNEY LEADERSHIP SIMULATOR</div>
            <h2 style={{fontSize:"24px",fontWeight:"bold",color:C.white,margin:"6px 0"}}>{name}'s Leadership Profile</h2>
            <p style={{fontSize:"11px",color:C.mist}}>Based on 8 Disney CEO decisions + {askedQs.size} interview questions</p>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
            <div style={{padding:"14px",textAlign:"center",background:C.forest}}><div style={{fontSize:"30px",fontWeight:"bold",color:C.lima}}>{igerMatch}%</div><div style={{fontSize:"11px",color:C.mist}}>Iger Alignment</div></div>
            <div style={{padding:"14px",textAlign:"center",background:C.orient}}><div style={{fontSize:"30px",fontWeight:"bold",color:C.white}}>{profile.clockScore}/16</div><div style={{fontSize:"11px",color:C.mist}}>{clockLabel}</div></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",textAlign:"center",background:C.white}}>
            {[{l:"STYLE",v:profile.topStyle,c:C.forest},{l:"CONFLICT",v:profile.topConflict,c:C.orient},{l:"PARADIGM",v:profile.topParadigm,c:C.cyprus}].map((x,i)=><div key={i} style={{padding:"10px",borderRight:i<2?`1px solid ${C.pebble}`:"none"}}><div style={{fontSize:"10px",fontWeight:"bold",letterSpacing:"1px",color:x.c,marginBottom:"4px"}}>{x.l}</div><div style={{fontSize:"13px",fontWeight:"bold",textTransform:"capitalize",color:C.darkGray}}>{x.v}</div></div>)}
          </div>
          <div style={{padding:"10px 14px",background:C.offWhite}}>
            <div style={{fontSize:"10px",fontWeight:"bold",letterSpacing:"1px",color:C.shuttle,marginBottom:"6px"}}>YOUR 8 DECISIONS</div>
            {sum.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:"6px",fontSize:"11px",marginBottom:"3px",flexWrap:"wrap"}}><span style={{width:"20px",height:"20px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold",fontSize:"10px",background:s.matched?C.lima:C.pebble,color:s.matched?C.forest:C.shuttle,flexShrink:0}}>{s.choice}</span><strong style={{color:C.darkGray}}>{s.title}</strong><span style={{padding:"1px 6px",borderRadius:"3px",fontSize:"9px",background:C.mist,color:C.forest,flexShrink:0}}>{s.act}</span>{s.matched&&<span style={{fontSize:"9px",color:C.lima,flexShrink:0}}>= Iger</span>}{s.option&&<span style={{marginLeft:"auto",textTransform:"capitalize",color:C.shuttle,fontSize:"10px",flexShrink:0}}>{s.option.style}/{s.option.paradigm}</span>}</div>)}
          </div>
          <div style={{padding:"8px",textAlign:"center",background:C.forest}}><span style={{fontSize:"11px",fontWeight:"bold",color:C.lima}}>SCREENSHOT THIS CARD FOR SUBMISSION</span></div>
        </div>

        {/* Charts */}
        {[{t:"LEADERSHIP STYLE",d:profile.styleCounts,c:C.forest,k:"topStyle",ds:descs.style},{t:"CONFLICT-HANDLING MODE",d:profile.conflictCounts,c:C.orient,k:"topConflict",ds:descs.conflict},{t:"LEADERSHIP PARADIGM",d:profile.paradigmCounts,c:C.cyprus,k:"topParadigm",ds:descs.paradigm}].map((ch,i)=><div key={i} style={{padding:"14px",borderRadius:"12px",border:`1px solid ${C.pebble}`,background:C.white,marginBottom:"14px"}}><h3 style={{fontSize:"12px",fontWeight:"bold",color:ch.c,marginBottom:"10px"}}>{ch.t}</h3><BarChart data={ch.d} color={ch.c}/><div style={{marginTop:"10px",fontSize:"11px",padding:"8px",borderRadius:"4px",background:C.mist+"40",color:C.forest}}><strong>Your tendency:</strong> {profile[ch.k].charAt(0).toUpperCase()+profile[ch.k].slice(1)} — {ch.ds[profile[ch.k]]||"Balanced approach."}</div></div>)}

        <div style={{padding:"16px",borderRadius:"12px",border:`1px solid ${C.pebble}`,background:C.white,textAlign:"center",marginBottom:"14px"}}><h3 style={{fontSize:"12px",fontWeight:"bold",color:C.forest,marginBottom:"10px"}}>CLOCK BUILDER vs. TIME TELLER</h3><div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"12px"}}><span style={{fontSize:"11px",fontWeight:"bold",color:C.orient}}>Time Teller</span><div style={{width:"180px",height:"10px",borderRadius:"5px",background:C.pebble}}><div style={{height:"100%",borderRadius:"5px",width:`${(profile.clockScore/16)*100}%`,background:`linear-gradient(to right,${C.orient},${C.lima})`,transition:"width 0.7s"}}/></div><span style={{fontSize:"11px",fontWeight:"bold",color:C.lima}}>Clock Builder</span></div><div style={{fontSize:"16px",fontWeight:"bold",color:C.forest,marginTop:"6px"}}>{clockLabel}</div><p style={{fontSize:"11px",color:C.shuttle}}>Score: {profile.clockScore}/16</p></div>

        {/* Next Steps */}
        <div style={{padding:"16px",borderRadius:"12px",background:C.mist,marginBottom:"14px"}}>
          <div style={{fontSize:"11px",fontWeight:"bold",letterSpacing:"2px",color:C.forest,marginBottom:"8px"}}>NEXT STEPS</div>
          <div style={{fontSize:"13px",color:C.forest,lineHeight:1.6}}>
            <p style={{margin:"0 0 6px"}}><strong>1.</strong> Screenshot the profile card above (it says "SCREENSHOT THIS CARD" at the bottom).</p>
            <p style={{margin:"0 0 6px"}}><strong>2.</strong> Complete the <strong>Reflection Worksheet</strong> (5 questions, 3-5 sentences each). Use your notes and the specific details from this simulator.</p>
            <p style={{margin:"0"}}><strong>3.</strong> Upload both (screenshot + worksheet) to the <strong>Session 9.3 assignment on Canvas</strong>.</p>
          </div>
        </div>

        <button onClick={()=>{setPhase("welcome");setChoices(Array(8).fill(null));setIdx(0);setMsgs([]);setShowExp(false);setName("");setAskedQs(new Set());setShowCats(null);setNotes("");}} style={{width:"100%",padding:"12px",borderRadius:"8px",fontWeight:"bold",fontSize:"13px",background:C.pebble,color:C.darkGray,border:"none",cursor:"pointer"}}>Start Over</button>
      </div></div>);}
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
